name: Deploy Ladle to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, необходимые для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно только один деплой; новый пуш отменяет предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # base должен совпадать с именем репозитория (project page обслуживается на /<repo>/)
      - run: npx ladle build --base /virtualization/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
